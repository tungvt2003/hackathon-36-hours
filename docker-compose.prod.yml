version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-voice_mobility}
      POSTGRES_USER: ${POSTGRES_USER:-vmuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vmpass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vmuser} -d ${POSTGRES_DB:-voice_mobility}"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-vmuser}:${POSTGRES_PASSWORD:-vmpass}@postgres:5432/${POSTGRES_DB:-voice_mobility}
      NODE_ENV: production
      PORT: 3000
      PROVIDER_STT: mock
      PROVIDER_NLU: mock
      PROVIDER_PLACES: db
      PROVIDER_WEATHER: mock
      PROVIDER_PARTNER: db
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
