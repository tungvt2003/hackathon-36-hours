<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Voice Assistant Demo</title>
<style>
  :root { --bg: #0f0f0f; --card: #1a1a2e; --accent: #e94560; --accent2: #0f3460; --text: #eee; --dim: #888; --green: #27ae60; --border: #333; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100dvh; display: flex; flex-direction: column; }

  header { padding: 16px 20px; background: var(--card); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
  header h1 { font-size: 18px; font-weight: 600; }
  header .status { margin-left: auto; font-size: 13px; color: var(--dim); }
  header .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; background: #e74c3c; }
  header .dot.ok { background: var(--green); }

  #chat { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 12px; }
  .msg { max-width: 85%; padding: 10px 14px; border-radius: 16px; font-size: 15px; line-height: 1.5; word-break: break-word; }
  .msg.user { align-self: flex-end; background: var(--accent2); border-bottom-right-radius: 4px; }
  .msg.bot { align-self: flex-start; background: var(--card); border-bottom-left-radius: 4px; }
  .msg .meta { font-size: 11px; color: var(--dim); margin-top: 6px; }
  .msg audio { margin-top: 6px; width: 100%; height: 32px; }
  .msg .btns { display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap; }
  .btn-sm { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; color: #fff; border: none; border-radius: 12px; font-size: 12px; cursor: pointer; text-decoration: none; }
  .btn-sm:hover { opacity: 0.85; }
  .btn-play { background: var(--accent); }
  .btn-dl { background: var(--accent2); border: 1px solid #2563eb; }

  #controls { padding: 12px 20px 24px; background: var(--card); border-top: 1px solid var(--border); display: flex; gap: 12px; align-items: center; }
  #mic-btn { width: 64px; height: 64px; border-radius: 50%; border: 3px solid var(--accent); background: transparent; color: var(--accent); font-size: 28px; cursor: pointer; transition: all 0.2s; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
  #mic-btn.recording { background: var(--accent); color: #fff; animation: pulse 1s ease-in-out infinite; }
  #mic-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(233,69,96,0.4); } 50% { box-shadow: 0 0 0 12px rgba(233,69,96,0); } }

  #text-input { flex: 1; padding: 12px 16px; border-radius: 24px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 15px; outline: none; }
  #text-input:focus { border-color: var(--accent); }
  #send-btn { width: 44px; height: 44px; border-radius: 50%; border: none; background: var(--accent); color: #fff; font-size: 18px; cursor: pointer; flex-shrink: 0; }
  #send-btn:disabled { opacity: 0.3; }

  #rec-timer { font-size: 13px; color: var(--accent); font-variant-numeric: tabular-nums; min-width: 36px; }

  .payload-block { margin-top: 8px; }
  .payload-block summary { cursor: pointer; font-size: 11px; color: var(--dim); }
  .payload-block pre { margin-top: 4px; padding: 8px; background: #111; border-radius: 6px; font-size: 11px; overflow-x: auto; color: #9d9; white-space: pre-wrap; max-height: 300px; overflow-y: auto; }
  .payload-block.req pre { color: #9bf; }
  .payload-block.res pre { color: #9d9; }

  .example-section { padding: 12px 20px; background: #111; border-top: 1px solid var(--border); }
  .example-section summary { cursor: pointer; font-size: 13px; color: var(--dim); }
  .example-section pre { margin-top: 8px; padding: 10px; background: var(--card); border-radius: 8px; font-size: 12px; overflow-x: auto; color: #bbb; white-space: pre-wrap; }
</style>
</head>
<body>

<header>
  <h1>Voice Assistant</h1>
  <span class="status"><span class="dot" id="dot"></span><span id="conn-text">Connecting...</span></span>
</header>

<div id="chat"></div>

<div id="controls">
  <button id="mic-btn" title="Nhan de ghi am">&#127908;</button>
  <span id="rec-timer"></span>
  <input type="text" id="text-input" placeholder="Hoac go text tai day..." autocomplete="off">
  <button id="send-btn" title="Gui">&#10148;</button>
</div>

<details class="example-section">
  <summary>Xem payload mau</summary>
  <pre id="example-payload"></pre>
</details>

<script>
const API = location.origin;
let sessionId = null;
let mediaRecorder = null;
let audioChunks = [];
let recStartTime = null;
let recInterval = null;
let turnCount = 0;

const chat = document.getElementById('chat');
const micBtn = document.getElementById('mic-btn');
const textInput = document.getElementById('text-input');
const sendBtn = document.getElementById('send-btn');
const dot = document.getElementById('dot');
const connText = document.getElementById('conn-text');
const recTimer = document.getElementById('rec-timer');
const exPayload = document.getElementById('example-payload');

exPayload.textContent = JSON.stringify({
  "POST /turn (text)": {
    session_id: "<session_id>",
    transcript: "dat xe toi san bay"
  },
  "POST /turn (audio)": {
    session_id: "<session_id>",
    audio_base64: "UklGRi4AAABXQVZFZm10IBAAAA... (WAV LINEAR16 16kHz)",
    sample_rate: 16000
  },
  "Response": {
    ok: true,
    data: {
      session_id: "...", turn_index: 1,
      asr_transcript: "Dat xe toi san bay", asr_confidence: 0.95,
      intent: "NAVIGATE", slots: { destination_query: "san bay" },
      response_text: "San bay Tan Son Nhat... Dung noi ban muon toi chu?",
      audio_url: "data:audio/wav;base64,...",
      state: { current_flow: "NAV", current_state: "CONFIRM_DESTINATION", active_booking: null }
    }
  }
}, null, 2);

// ── Helpers ──
function makeWavDataUrl(base64) {
  return 'data:audio/wav;base64,' + base64;
}

function downloadBlob(dataUrl, filename) {
  const a = document.createElement('a');
  a.href = dataUrl;
  a.download = filename;
  a.click();
}

// ── Init ──
async function init() {
  try {
    const r = await fetch(`${API}/health`);
    if (!r.ok) throw new Error();
    dot.classList.add('ok');
    connText.textContent = 'Connected';
  } catch {
    connText.textContent = 'Server offline';
    return;
  }
  try {
    const r = await fetch(`${API}/session`, { method: 'POST' });
    const d = await r.json();
    sessionId = d.data.session_id;
    addBotMsg(d.data.greeting, null, d.data.audio_url);
  } catch (e) {
    addBotMsg('Loi tao session: ' + e.message);
  }
}

// ── Chat UI ──
function addUserTextMsg(text) {
  const div = document.createElement('div');
  div.className = 'msg user';
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function addUserAudioMsg(wavBase64) {
  turnCount++;
  const div = document.createElement('div');
  div.className = 'msg user';
  div.id = 'user-audio-' + turnCount;
  const wavUrl = makeWavDataUrl(wavBase64);
  div.innerHTML = `
    <div style="color:var(--dim);font-size:13px">Dang nhan dien...</div>
    <audio controls src="${wavUrl}"></audio>
    <div class="btns">
      <a class="btn-sm btn-dl" href="${wavUrl}" download="recording_${turnCount}.wav">&#11015; Tai WAV</a>
    </div>
  `;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

function updateUserAudioMsg(div, transcript, confidence) {
  const label = div.querySelector('div');
  if (label) {
    const pct = confidence ? ` (${(confidence*100).toFixed(0)}%)` : '';
    label.textContent = transcript + pct;
    label.style.color = 'var(--text)';
  }
}

function addBotMsg(text, meta, audioUrl, reqPayload, resPayload) {
  const div = document.createElement('div');
  div.className = 'msg bot';
  let html = text;
  if (meta) html += `<div class="meta">${meta}</div>`;
  if (audioUrl) {
    html += `<audio controls src="${audioUrl}" style="margin-top:6px;width:100%;height:32px"></audio>`;
  }
  if (reqPayload) {
    html += `<details class="payload-block req"><summary>Request payload</summary><pre>${escHtml(JSON.stringify(reqPayload, null, 2))}</pre></details>`;
  }
  if (resPayload) {
    html += `<details class="payload-block res"><summary>Response payload</summary><pre>${escHtml(JSON.stringify(resPayload, null, 2))}</pre></details>`;
  }
  div.innerHTML = html;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Send text ──
async function sendText(text) {
  if (!text.trim() || !sessionId) return;
  addUserTextMsg(text);
  textInput.value = '';
  setLoading(true);
  const reqBody = { session_id: sessionId, transcript: text };
  try {
    const r = await fetch(`${API}/turn`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(reqBody)
    });
    const d = await r.json();
    handleResponse(d, reqBody);
  } catch (e) {
    addBotMsg('Loi: ' + e.message);
  }
  setLoading(false);
}

// ── Send audio ──
async function sendAudio(wavBase64, sampleRate) {
  const userDiv = addUserAudioMsg(wavBase64);
  setLoading(true);
  const reqBody = { session_id: sessionId, audio_base64: '(base64 ' + Math.round(wavBase64.length/1024) + 'KB)', sample_rate: sampleRate };
  try {
    const r = await fetch(`${API}/turn`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: sessionId, audio_base64: wavBase64, sample_rate: sampleRate })
    });
    const d = await r.json();
    if (d.data) {
      const asr = d.data.asr_transcript || d.data.transcript || '(khong nghe ro)';
      updateUserAudioMsg(userDiv, asr, d.data.asr_confidence);
    }
    handleResponse(d, reqBody);
  } catch (e) {
    addBotMsg('Loi: ' + e.message);
  }
  setLoading(false);
}

function handleResponse(d, reqPayload) {
  if (!d.ok) { addBotMsg('Loi: ' + (d.error || 'Unknown'), null, null, reqPayload, d); return; }
  const data = d.data;
  const meta = `${data.intent} (${(data.intent_confidence*100).toFixed(0)}%) | ${data.state?.current_flow || 'none'} > ${data.state?.current_state}`;
  // Build clean response payload (without huge audio_url)
  const cleanRes = { ...d };
  if (cleanRes.data?.audio_url) {
    cleanRes.data = { ...cleanRes.data, audio_url: '(audio data...)' };
  }
  addBotMsg(data.response_text, meta, data.audio_url, reqPayload, cleanRes);
}

function setLoading(v) {
  micBtn.disabled = v;
  sendBtn.disabled = v;
}

// ── Recording ──
async function startRecording() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: { sampleRate: 16000, channelCount: 1, echoCancellation: true, noiseSuppression: true } });
    audioChunks = [];
    mediaRecorder = new MediaRecorder(stream, { mimeType: getBestMime() });
    mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) audioChunks.push(e.data); };
    mediaRecorder.onstop = async () => {
      stream.getTracks().forEach(t => t.stop());
      clearInterval(recInterval);
      recTimer.textContent = '';
      const blob = new Blob(audioChunks, { type: mediaRecorder.mimeType });
      const { wavBase64, sampleRate } = await blobToWavBase64(blob);
      sendAudio(wavBase64, sampleRate);
    };
    mediaRecorder.start();
    micBtn.classList.add('recording');
    recStartTime = Date.now();
    recInterval = setInterval(() => {
      const s = ((Date.now() - recStartTime) / 1000).toFixed(1);
      recTimer.textContent = s + 's';
    }, 100);
  } catch (e) {
    alert('Khong the truy cap mic: ' + e.message);
  }
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    mediaRecorder.stop();
    micBtn.classList.remove('recording');
  }
}

function getBestMime() {
  for (const m of ['audio/webm;codecs=opus', 'audio/webm', 'audio/ogg;codecs=opus', 'audio/mp4']) {
    if (MediaRecorder.isTypeSupported(m)) return m;
  }
  return '';
}

async function blobToWavBase64(blob) {
  const arrayBuf = await blob.arrayBuffer();
  let audioBuf;
  try {
    const ctx = new OfflineAudioContext(1, 1, 16000);
    audioBuf = await ctx.decodeAudioData(arrayBuf);
  } catch {
    const ctx2 = new OfflineAudioContext(1, 1, 48000);
    audioBuf = await ctx2.decodeAudioData(arrayBuf);
  }

  const targetRate = 16000;
  const numSamples = Math.round(audioBuf.duration * targetRate);
  const offCtx = new OfflineAudioContext(1, numSamples, targetRate);
  const src = offCtx.createBufferSource();
  src.buffer = audioBuf;
  src.connect(offCtx.destination);
  src.start();
  const resampled = await offCtx.startRendering();
  const pcm = resampled.getChannelData(0);

  const wavBuf = encodeWAV(pcm, targetRate);
  const bytes = new Uint8Array(wavBuf);
  let binary = '';
  for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
  return { wavBase64: btoa(binary), sampleRate: targetRate };
}

function encodeWAV(samples, sampleRate) {
  const buffer = new ArrayBuffer(44 + samples.length * 2);
  const view = new DataView(buffer);
  writeStr(view, 0, 'RIFF');
  view.setUint32(4, 36 + samples.length * 2, true);
  writeStr(view, 8, 'WAVE');
  writeStr(view, 12, 'fmt ');
  view.setUint32(16, 16, true);
  view.setUint16(20, 1, true);
  view.setUint16(22, 1, true);
  view.setUint32(24, sampleRate, true);
  view.setUint32(28, sampleRate * 2, true);
  view.setUint16(32, 2, true);
  view.setUint16(34, 16, true);
  writeStr(view, 36, 'data');
  view.setUint32(40, samples.length * 2, true);
  for (let i = 0; i < samples.length; i++) {
    const s = Math.max(-1, Math.min(1, samples[i]));
    view.setInt16(44 + i * 2, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
  }
  return buffer;
}

function writeStr(view, offset, str) {
  for (let i = 0; i < str.length; i++) view.setUint8(offset + i, str.charCodeAt(i));
}

// ── Events ──
micBtn.addEventListener('click', () => {
  if (mediaRecorder && mediaRecorder.state === 'recording') stopRecording();
  else startRecording();
});

sendBtn.addEventListener('click', () => sendText(textInput.value));
textInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendText(textInput.value); });

init();
</script>
</body>
</html>
